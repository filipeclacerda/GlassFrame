[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!CommandMeasure MeasureLayout "RefreshAll()"]
MouseOverAction=[!CommandMeasure MeasureLayout "ShowControls()"]
MouseLeaveAction=[!CommandMeasure MeasureLayout "HideControls()"]
@include=Variables.inc

[Metadata]
Name=GlassFrame
Author=Filipe
Information=A quiet glass photo frame with folder slideshow and manual modes.
Version=2.1.0
License=MIT License

[MeasureLayout]
Measure=Script
ScriptFile=Layout.lua
DynamicVariables=1

[MeasureSettings]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -STA -File "#CURRENTPATH#LaunchSettings.ps1"
State=Hide
FinishAction=[!Refresh]

; The background owns scrolling so resizing is disabled while the controls are open.
[Background]
Meter=Shape
DynamicVariables=1
Shape=Rectangle 0,0,(#BaseW#*#Scale#),(#BaseH#*#Scale#),(#OuterRadius#*#Scale#) | Fill Color #Accent#,#BgAlpha# | Stroke Color 255,255,255,28 | StrokeWidth (1*#Scale#)
MouseScrollUpAction=[!CommandMeasure MeasureLayout "AdjustScale(0.1)"]
MouseScrollDownAction=[!CommandMeasure MeasureLayout "AdjustScale(-0.1)"]

; Masks are positioned exclusively by Layout.lua.
[Mask1]
Group=Slots
Meter=Shape
DynamicVariables=1
Shape=Rectangle 0,0,1,1,1 | Fill Color 20,20,28,255 | StrokeWidth 0

[Slot1]
Group=Slots
Meter=Image
Container=Mask1
DynamicVariables=1
PreserveAspectRatio=2

[Mask2]
Group=Slots
Meter=Shape
DynamicVariables=1
Shape=Rectangle 0,0,1,1,1 | Fill Color 20,20,28,255 | StrokeWidth 0

[Slot2]
Group=Slots
Meter=Image
Container=Mask2
DynamicVariables=1
PreserveAspectRatio=2

[Mask3]
Group=Slots
Meter=Shape
DynamicVariables=1
Shape=Rectangle 0,0,1,1,1 | Fill Color 20,20,28,255 | StrokeWidth 0

[Slot3]
Group=Slots
Meter=Image
Container=Mask3
DynamicVariables=1
PreserveAspectRatio=2

[Mask4]
Group=Slots
Meter=Shape
DynamicVariables=1
Shape=Rectangle 0,0,1,1,1 | Fill Color 20,20,28,255 | StrokeWidth 0

[Slot4]
Group=Slots
Meter=Image
Container=Mask4
DynamicVariables=1
PreserveAspectRatio=2

[EmptyState]
Meter=String
DynamicVariables=1
X=(220*#Scale#)
Y=(127*#Scale#)
W=(380*#Scale#)
H=(80*#Scale#)
StringAlign=CenterCenter
FontFace=Segoe UI
FontSize=(13*#Scale#)
FontColor=235,235,244,225
AntiAlias=1
ClipString=2
SolidColor=0,0,0,1
LeftMouseUpAction=[!CommandMeasure MeasureSettings "Run"]

; Reserved controls strip: it never overlaps the photo area.
[ControlPanel]
Group=Controls
Hidden=1
Meter=Shape
DynamicVariables=1
Shape=Rectangle (8*#Scale#),(226*#Scale#),(424*#Scale#),(40*#Scale#),(13*#Scale#) | Fill Color 16,17,24,#PanelAlpha# | Stroke Color 255,255,255,24 | StrokeWidth (1*#Scale#)

[Previous]
Meter=String
MeterStyle=ControlText
Group=Controls
Hidden=1
X=(36*#Scale#)
Text=<
ToolTipText=Previous
LeftMouseUpAction=[!CommandMeasure MeasureLayout "PreviousSet()"]

[PlayPause]
Meter=String
MeterStyle=ControlText
Group=Controls
Hidden=1
X=(82*#Scale#)
Text=>
ToolTipText=Play / Pause
LeftMouseUpAction=[!CommandMeasure MeasureLayout "TogglePause()"]

[Next]
Meter=String
MeterStyle=ControlText
Group=Controls
Hidden=1
X=(128*#Scale#)
Text=>
ToolTipText=Next
LeftMouseUpAction=[!CommandMeasure MeasureLayout "NextSet(true)"]

[LayoutButton]
Meter=String
MeterStyle=ControlText
Group=Controls
Hidden=1
X=(184*#Scale#)
W=(68*#Scale#)
FontSize=(16*#Scale#)
Text=[ ]
ToolTipText=Change layout
LeftMouseUpAction=[!CommandMeasure MeasureLayout "CycleMode()"]

[SettingsButton]
Meter=Shape
Group=Controls
Hidden=1
DynamicVariables=1
Shape=Ellipse (376*#Scale#),(246*#Scale#),(8*#Scale#),(8*#Scale#) | Fill Color 0,0,0,1 | Stroke Color 232,233,241,245 | StrokeWidth (2*#Scale#)
Shape2=Ellipse (376*#Scale#),(246*#Scale#),(3*#Scale#),(3*#Scale#) | Fill Color 232,233,241,245 | StrokeWidth 0
Shape3=Line (376*#Scale#),(233*#Scale#),(376*#Scale#),(238*#Scale#) | Stroke Color 232,233,241,245 | StrokeWidth (3*#Scale#)
Shape4=Line (376*#Scale#),(254*#Scale#),(376*#Scale#),(259*#Scale#) | Stroke Color 232,233,241,245 | StrokeWidth (3*#Scale#)
Shape5=Line (363*#Scale#),(246*#Scale#),(368*#Scale#),(246*#Scale#) | Stroke Color 232,233,241,245 | StrokeWidth (3*#Scale#)
Shape6=Line (384*#Scale#),(246*#Scale#),(389*#Scale#),(246*#Scale#) | Stroke Color 232,233,241,245 | StrokeWidth (3*#Scale#)
Shape7=Line (367*#Scale#),(237*#Scale#),(371*#Scale#),(241*#Scale#) | Stroke Color 232,233,241,245 | StrokeWidth (3*#Scale#)
Shape8=Line (381*#Scale#),(251*#Scale#),(385*#Scale#),(255*#Scale#) | Stroke Color 232,233,241,245 | StrokeWidth (3*#Scale#)
Shape9=Line (367*#Scale#),(255*#Scale#),(371*#Scale#),(251*#Scale#) | Stroke Color 232,233,241,245 | StrokeWidth (3*#Scale#)
Shape10=Line (381*#Scale#),(241*#Scale#),(385*#Scale#),(237*#Scale#) | Stroke Color 232,233,241,245 | StrokeWidth (3*#Scale#)
Shape11=Rectangle (346*#Scale#),(228*#Scale#),(60*#Scale#),(36*#Scale#) | Fill Color 0,0,0,1 | StrokeWidth 0
ToolTipText=Settings
LeftMouseUpAction=[!CommandMeasure MeasureSettings "Run"]

[ControlText]
DynamicVariables=1
Y=(246*#Scale#)
W=(42*#Scale#)
H=(32*#Scale#)
StringAlign=CenterCenter
FontFace=Segoe UI
FontWeight=600
FontSize=(16*#Scale#)
FontColor=232,233,241,245
AntiAlias=1
SolidColor=0,0,0,1

[Feedback]
Meter=String
Hidden=1
DynamicVariables=1
X=(220*#Scale#)
Y=(218*#Scale#)
W=(300*#Scale#)
H=(28*#Scale#)
StringAlign=CenterCenter
FontFace=Segoe UI
FontSize=(10*#Scale#)
FontColor=245,245,250,235
SolidColor=10,10,16,190
Padding=(10*#Scale#),(4*#Scale#),(10*#Scale#),(4*#Scale#)
AntiAlias=1
