[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
@include=Variables.inc
MouseOverAction=[!SetVariable TA 235][!UpdateMeter Toggle][!Redraw]
MouseLeaveAction=[!SetVariable TA 0][!UpdateMeter Toggle][!Redraw]

[Metadata]
Name=GlassFrame
Author=Filipe
Information=An elegant and minimal dynamic picture frame skin for Rainmeter.
Version=1.0.0
License=MIT License

[MeasureSettings]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -STA -File "#CURRENTPATH#Settings.ps1"
State=Hide

; ── Internal appearance (Accent and BgAlpha are in Variables.inc) ──
[Variables]
Scale=1.0
Mode=1
Gap=10
Rad=16
OuterRad=22
BgColor=12,12,20
PanelAlpha=215
Font=Segoe UI
TA=0

; ── Rounded background (transparency #BgAlpha#) + scroll capture ──
[Background]
Meter=Shape
DynamicVariables=1
Shape=Rectangle 0,0,(440*#Scale#),(330*#Scale#),(#OuterRad#*#Scale#) | Fill Color #Accent#,#BgAlpha# | StrokeWidth 0
MouseScrollUpAction=[!SetVariable Scale "((#Scale#+0.1)*((#Scale#+0.1)<=3)+3*((#Scale#+0.1)>3))"][!UpdateMeter Background][!UpdateMeterGroup Slots][!UpdateMeterGroup Controls][!UpdateMeter Toggle][!Redraw]
MouseScrollDownAction=[!SetVariable Scale "((#Scale#-0.1)*((#Scale#-0.1)>=0.4)+0.4*((#Scale#-0.1)<0.4))"][!UpdateMeter Background][!UpdateMeterGroup Slots][!UpdateMeterGroup Controls][!UpdateMeter Toggle][!Redraw]

; ══════════════════════════════════════════════════════════════════
;  IMAGES — rounded mask + Image (Container). Mode 5 = circle
; ══════════════════════════════════════════════════════════════════

[Mask1]
Group=Slots
Meter=Shape
DynamicVariables=1
Shape=Rectangle (440*#Scale#*((#Mode#=5)*0.125)+#Gap#*#Scale#),(#Gap#*#Scale#),(440*#Scale#*((#Mode#=1)+(#Mode#=2)*0.5+(#Mode#=3)*0.3334+(#Mode#=4)*0.5+(#Mode#=5)*0.75)-2*#Gap#*#Scale#),(330*#Scale#*((#Mode#=1)+(#Mode#=2)+(#Mode#=3)+(#Mode#=4)*0.5+(#Mode#=5))-2*#Gap#*#Scale#),((#Rad#*#Scale#)*(#Mode#<5)+((330*#Scale#-2*#Gap#*#Scale#)/2)*(#Mode#=5)) | Fill Color 20,20,28,255 | StrokeWidth 0

[Slot1]
Group=Slots
Meter=Image
ImageName=#Image1#
Container=Mask1
DynamicVariables=1
PreserveAspectRatio=2
X=(440*#Scale#*((#Mode#=5)*0.125))
Y=0
W=(440*#Scale#*((#Mode#=1)+(#Mode#=2)*0.5+(#Mode#=3)*0.3334+(#Mode#=4)*0.5+(#Mode#=5)*0.75))
H=(330*#Scale#*((#Mode#=1)+(#Mode#=2)+(#Mode#=3)+(#Mode#=4)*0.5+(#Mode#=5)))

[Mask2]
Group=Slots
Hidden=1
Meter=Shape
DynamicVariables=1
Shape=Rectangle (440*#Scale#*((#Mode#=2)*0.5+(#Mode#=3)*0.3334+(#Mode#=4)*0.5)+#Gap#*#Scale#),(#Gap#*#Scale#),(440*#Scale#*((#Mode#=2)*0.5+(#Mode#=3)*0.3333+(#Mode#=4)*0.5)-2*#Gap#*#Scale#),(330*#Scale#*((#Mode#=2)+(#Mode#=3)+(#Mode#=4)*0.5)-2*#Gap#*#Scale#),(#Rad#*#Scale#) | Fill Color 20,20,28,255 | StrokeWidth 0

[Slot2]
Group=Slots
Hidden=1
Meter=Image
ImageName=#Image2#
Container=Mask2
DynamicVariables=1
PreserveAspectRatio=2
X=(440*#Scale#*((#Mode#=2)*0.5+(#Mode#=3)*0.3334+(#Mode#=4)*0.5))
Y=0
W=(440*#Scale#*((#Mode#=2)*0.5+(#Mode#=3)*0.3333+(#Mode#=4)*0.5))
H=(330*#Scale#*((#Mode#=2)+(#Mode#=3)+(#Mode#=4)*0.5))

[Mask3]
Group=Slots
Hidden=1
Meter=Shape
DynamicVariables=1
Shape=Rectangle (440*#Scale#*((#Mode#=3)*0.6667)+#Gap#*#Scale#),(330*#Scale#*((#Mode#=4)*0.5)+#Gap#*#Scale#),(440*#Scale#*((#Mode#=3)*0.3333+(#Mode#=4)*0.5)-2*#Gap#*#Scale#),(330*#Scale#*((#Mode#=3)+(#Mode#=4)*0.5)-2*#Gap#*#Scale#),(#Rad#*#Scale#) | Fill Color 20,20,28,255 | StrokeWidth 0

[Slot3]
Group=Slots
Hidden=1
Meter=Image
ImageName=#Image3#
Container=Mask3
DynamicVariables=1
PreserveAspectRatio=2
X=(440*#Scale#*((#Mode#=3)*0.6667))
Y=(330*#Scale#*((#Mode#=4)*0.5))
W=(440*#Scale#*((#Mode#=3)*0.3333+(#Mode#=4)*0.5))
H=(330*#Scale#*((#Mode#=3)+(#Mode#=4)*0.5))

[Mask4]
Group=Slots
Hidden=1
Meter=Shape
DynamicVariables=1
Shape=Rectangle (440*#Scale#*((#Mode#=4)*0.5)+#Gap#*#Scale#),(330*#Scale#*((#Mode#=4)*0.5)+#Gap#*#Scale#),(440*#Scale#*((#Mode#=4)*0.5)-2*#Gap#*#Scale#),(330*#Scale#*((#Mode#=4)*0.5)-2*#Gap#*#Scale#),(#Rad#*#Scale#) | Fill Color 20,20,28,255 | StrokeWidth 0

[Slot4]
Group=Slots
Hidden=1
Meter=Image
ImageName=#Image4#
Container=Mask4
DynamicVariables=1
PreserveAspectRatio=2
X=(440*#Scale#*((#Mode#=4)*0.5))
Y=(330*#Scale#*((#Mode#=4)*0.5))
W=(440*#Scale#*((#Mode#=4)*0.5))
H=(330*#Scale#*((#Mode#=4)*0.5))

; ══════════════════════════════════════════════════════════════════
;  FLOATING PANEL + BUTTONS — Controls group, hidden by default
; ══════════════════════════════════════════════════════════════════

[Panel]
Group=Controls
Hidden=1
Meter=Shape
DynamicVariables=1
Shape=Rectangle (14*#Scale#),(272*#Scale#),(412*#Scale#),(46*#Scale#),(16*#Scale#) | Fill Color 18,18,28,#PanelAlpha# | Stroke Color 255,255,255,28 | StrokeWidth (1*#Scale#)

; Active mode indicator bar (uses live #Accent#)
[ActiveBar]
Group=Controls
Hidden=1
Meter=Shape
DynamicVariables=1
Shape=Rectangle ((34+(#Mode#-1)*38)*#Scale#),(313*#Scale#),(24*#Scale#),(3*#Scale#),(1.5*#Scale#) | Fill Color #Accent#,255 | StrokeWidth 0

[Btn1]
Group=Controls
Hidden=1
Meter=String
DynamicVariables=1
X=(46*#Scale#)
Y=(294*#Scale#)
W=(38*#Scale#)
H=(38*#Scale#)
StringAlign=CenterCenter
SolidColor=0,0,0,1
FontFace=#Font#
FontWeight=600
FontColor=228,228,238,255
FontSize=(15*#Scale#)
AntiAlias=1
Text=1
LeftMouseUpAction=[!SetVariable Mode 1][!ShowMeter Mask1][!ShowMeter Slot1][!HideMeter Mask2][!HideMeter Slot2][!HideMeter Mask3][!HideMeter Slot3][!HideMeter Mask4][!HideMeter Slot4][!UpdateMeterGroup Slots][!UpdateMeter ActiveBar][!Redraw]

[Btn2]
Group=Controls
Hidden=1
Meter=String
DynamicVariables=1
X=(84*#Scale#)
Y=(294*#Scale#)
W=(38*#Scale#)
H=(38*#Scale#)
StringAlign=CenterCenter
SolidColor=0,0,0,1
FontFace=#Font#
FontWeight=600
FontColor=228,228,238,255
FontSize=(15*#Scale#)
AntiAlias=1
Text=2
LeftMouseUpAction=[!SetVariable Mode 2][!ShowMeter Mask1][!ShowMeter Slot1][!ShowMeter Mask2][!ShowMeter Slot2][!HideMeter Mask3][!HideMeter Slot3][!HideMeter Mask4][!HideMeter Slot4][!UpdateMeterGroup Slots][!UpdateMeter ActiveBar][!Redraw]

[Btn3]
Group=Controls
Hidden=1
Meter=String
DynamicVariables=1
X=(122*#Scale#)
Y=(294*#Scale#)
W=(38*#Scale#)
H=(38*#Scale#)
StringAlign=CenterCenter
SolidColor=0,0,0,1
FontFace=#Font#
FontWeight=600
FontColor=228,228,238,255
FontSize=(15*#Scale#)
AntiAlias=1
Text=3
LeftMouseUpAction=[!SetVariable Mode 3][!ShowMeter Mask1][!ShowMeter Slot1][!ShowMeter Mask2][!ShowMeter Slot2][!ShowMeter Mask3][!ShowMeter Slot3][!HideMeter Mask4][!HideMeter Slot4][!UpdateMeterGroup Slots][!UpdateMeter ActiveBar][!Redraw]

[Btn4]
Group=Controls
Hidden=1
Meter=String
DynamicVariables=1
X=(160*#Scale#)
Y=(294*#Scale#)
W=(38*#Scale#)
H=(38*#Scale#)
StringAlign=CenterCenter
SolidColor=0,0,0,1
FontFace=#Font#
FontWeight=600
FontColor=228,228,238,255
FontSize=(15*#Scale#)
AntiAlias=1
Text=4
LeftMouseUpAction=[!SetVariable Mode 4][!ShowMeterGroup Slots][!UpdateMeterGroup Slots][!UpdateMeter ActiveBar][!Redraw]

[Btn5]
Group=Controls
Hidden=1
Meter=String
DynamicVariables=1
X=(198*#Scale#)
Y=(294*#Scale#)
W=(38*#Scale#)
H=(38*#Scale#)
StringAlign=CenterCenter
SolidColor=0,0,0,1
FontFace=#Font#
FontWeight=600
FontColor=228,228,238,255
FontSize=(16*#Scale#)
AntiAlias=1
Text=O
LeftMouseUpAction=[!SetVariable Mode 5][!ShowMeter Mask1][!ShowMeter Slot1][!HideMeter Mask2][!HideMeter Slot2][!HideMeter Mask3][!HideMeter Slot3][!HideMeter Mask4][!HideMeter Slot4][!UpdateMeterGroup Slots][!UpdateMeter ActiveBar][!Redraw]

[BtnCfg]
Group=Controls
Hidden=1
Meter=String
DynamicVariables=1
X=(345*#Scale#)
Y=(294*#Scale#)
W=(150*#Scale#)
H=(38*#Scale#)
StringAlign=CenterCenter
SolidColor=0,0,0,1
FontFace=#Font#
FontWeight=600
FontColor=150,210,178,255
FontSize=(12*#Scale#)
AntiAlias=1
Text=Settings
LeftMouseUpAction=[!CommandMeasure MeasureSettings "Run"]

; ══════════════════════════════════════════════════════════════════
;  MENU BUTTON (hamburger) — always visible, toggles control panel
; ══════════════════════════════════════════════════════════════════

[Toggle]
Meter=Shape
DynamicVariables=1
Shape=Rectangle (400*#Scale#),(10*#Scale#),(30*#Scale#),(30*#Scale#),(15*#Scale#) | Fill Color 15,15,22,#TA# | StrokeWidth 0
Shape2=Rectangle (408*#Scale#),(18*#Scale#),(14*#Scale#),(2*#Scale#),(1*#Scale#) | Fill Color 230,230,242,#TA# | StrokeWidth 0
Shape3=Rectangle (408*#Scale#),(24*#Scale#),(14*#Scale#),(2*#Scale#),(1*#Scale#) | Fill Color 230,230,242,#TA# | StrokeWidth 0
Shape4=Rectangle (408*#Scale#),(30*#Scale#),(14*#Scale#),(2*#Scale#),(1*#Scale#) | Fill Color 230,230,242,#TA# | StrokeWidth 0
LeftMouseUpAction=[!ToggleMeterGroup Controls][!Redraw]
